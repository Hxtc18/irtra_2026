<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRTRA 2026 - Presupuesto y Checklist</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #f0fdf4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(#dcfce7 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Ajuste para móviles: Quita el resaltado azul al tocar */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Animaciones */
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }

        .animate-bounce-slow {
            animation: bounce-slow 2s infinite;
        }

        /* Estilos para el Ticket Final */
        .ticket-edge {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #f0fdf4;
            border-radius: 50%;
            top: 50%;
            border: 4px solid #ca8a04;
        }

        .ticket-edge.left {
            left: -19px;
            border-left-color: transparent;
            border-top-color: transparent;
            border-bottom-color: transparent;
            transform: translateY(-50%) rotate(45deg);
        }

        .ticket-edge.right {
            right: -19px;
            border-right-color: transparent;
            border-top-color: transparent;
            border-bottom-color: transparent;
            transform: translateY(-50%) rotate(-135deg);
        }

        /* Checkbox personalizado */
        .checkbox-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        /**
         * CODIGO PARA GOOGLE APPS SCRIPT (Copia esto en tu archivo .gs de Google):
         * * function doGet() {
         * var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
         * var data = sheet.getDataRange().getValues();
         * var result = [];
         * for (var i = 1; i < data.length; i++) {
         * result.push({ id: data[i][0], checked: data[i][1] === true || data[i][1] === "TRUE" });
         * }
         * return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);
         * }
         * * function doPost(e) {
         * var params = JSON.parse(e.postData.contents);
         * var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
         * var data = sheet.getDataRange().getValues();
         * for (var i = 1; i < data.length; i++) {
         * if (data[i][0] == params.id) {
         * sheet.getRange(i + 1, 2).setValue(params.checked);
         * break;
         * }
         * }
         * return ContentService.createTextOutput("OK").setMimeType(ContentService.MimeType.TEXT);
         * }
         */

        const { useState, useEffect, useMemo } = React;

        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVMD5FONlbXUO8GKCj5kNPX0_q8a4NyiilGSDBSmq5LhrzgXuUKTFb7wbdpnWN88I/exec";

        const INITIAL_DATA = [
            { id: 'h1', category: 'Hospedaje', group: 'San Martin', desc: 'Viernes a Sabado', cost: 285, checked: false },
            { id: 'h2', category: 'Hospedaje', group: 'San Martin', desc: 'Sabado a domingo', cost: 330, checked: false },
            { id: 'c1_v_m', category: 'Comida 1 (Irene)', group: 'Viernes', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c1_v_t', category: 'Comida 1 (Irene)', group: 'Viernes', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c1_v_n', category: 'Comida 1 (Irene)', group: 'Viernes', desc: 'Noche', cost: 100, checked: false },
            { id: 'c1_s_m', category: 'Comida 1 (Irene)', group: 'Sabado', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c1_s_t', category: 'Comida 1 (Irene)', group: 'Sabado', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c1_s_n', category: 'Comida 1 (Irene)', group: 'Sabado', desc: 'Noche', cost: 100, checked: false },
            { id: 'c1_d_m', category: 'Comida 1 (Irene)', group: 'Domingo', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c1_d_t', category: 'Comida 1 (Irene)', group: 'Domingo', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c1_d_n', category: 'Comida 1 (Irene)', group: 'Domingo', desc: 'Noche', cost: 100, checked: false },
            { id: 'c2_v_m', category: 'Comida 2 (Hector)', group: 'Viernes', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c2_v_t', category: 'Comida 2 (Hector)', group: 'Viernes', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c2_v_n', category: 'Comida 2 (Hector)', group: 'Viernes', desc: 'Noche', cost: 100, checked: false },
            { id: 'c2_s_m', category: 'Comida 2 (Hector)', group: 'Sabado', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c2_s_t', category: 'Comida 2 (Hector)', group: 'Sabado', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c2_s_n', category: 'Comida 2 (Hector)', group: 'Sabado', desc: 'Noche', cost: 100, checked: false },
            { id: 'c2_d_m', category: 'Comida 2 (Hector)', group: 'Domingo', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c2_d_t', category: 'Comida 2 (Hector)', group: 'Domingo', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c2_d_n', category: 'Comida 2 (Hector)', group: 'Domingo', desc: 'Noche', cost: 100, checked: false },
            { id: 'g1', category: 'Gasolina', group: 'Viernes', desc: 'Guate / Toto', cost: 300, checked: false },
            { id: 'g2', category: 'Gasolina', group: 'Viernes', desc: 'Toto / Reu (CUBIERTO)', cost: 0, checked: true },
            { id: 'g3', category: 'Gasolina', group: 'Domingo', desc: 'Reu / Toto (CUBIERTO)', cost: 0, checked: true },
            { id: 'g4', category: 'Gasolina', group: 'Domingo', desc: 'Toto / Guate', cost: 300, checked: false },
            { id: 'ch1', category: 'Chingaderas', group: 'General', desc: 'Presupuesto general', cost: 800, checked: false },
        ];

        const App = () => {
            const [items, setItems] = useState(INITIAL_DATA);
            const [syncStatus, setSyncStatus] = useState('Conectando...');

            // Cargar datos al iniciar
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch(GOOGLE_APP_SCRIPT_URL);
                        const data = await response.json();
                        if (data && Array.isArray(data)) {
                            const updatedItems = INITIAL_DATA.map(base => {
                                const cloud = data.find(d => d.id === base.id);
                                return cloud ? { ...base, checked: cloud.checked } : base;
                            });
                            setItems(updatedItems);
                            setSyncStatus('Sincronizado');
                        }
                    } catch (e) {
                        console.error("Fetch error:", e);
                        setSyncStatus('Modo Offline');
                    }
                };
                fetchData();
            }, []);

            const toggleCheck = async (id, currentStatus) => {
                const newStatus = !currentStatus;
                
                // Cambio optimista en UI
                setItems(prev => prev.map(item => item.id === id ? { ...item, checked: newStatus } : item));

                setSyncStatus('Guardando...');
                try {
                    // Usamos text/plain para evitar el Preflight de CORS en Google Apps Script
                    await fetch(GOOGLE_APP_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ id, checked: newStatus })
                    });
                    setSyncStatus('Guardado ✓');
                    setTimeout(() => setSyncStatus('Te amo mami'), 2000);
                } catch (e) {
                    setSyncStatus('Error al guardar');
                    // Revertir si falla
                    setItems(prev => prev.map(item => item.id === id ? { ...item, checked: currentStatus } : item));
                }
            };

            const categories = [...new Set(items.map(i => i.category))];
            const totalBudget = useMemo(() => items.reduce((acc, i) => acc + i.cost, 0), [items]);
            const totalPaid = useMemo(() => items.reduce((acc, i) => acc + (i.checked ? i.cost : 0), 0), [items]);
            const progress = (totalPaid / totalBudget) * 100;

            const getCatConfig = (cat) => {
                if (cat.includes('Hospedaje')) return { bg: 'bg-emerald-50', border: 'border-emerald-400', text: 'text-emerald-900', header: 'bg-emerald-200', icon: '' };
                if (cat.includes('Comida 1')) return { bg: 'bg-orange-50', border: 'border-orange-400', text: 'text-orange-900', header: 'bg-orange-200', icon: '' };
                if (cat.includes('Comida 2')) return { bg: 'bg-amber-50', border: 'border-amber-400', text: 'text-amber-900', header: 'bg-amber-200', icon: '' };
                if (cat.includes('Gasolina')) return { bg: 'bg-slate-50', border: 'border-slate-400', text: 'text-slate-900', header: 'bg-slate-200', icon: '' };
                return { bg: 'bg-fuchsia-50', border: 'border-fuchsia-400', text: 'text-fuchsia-900', header: 'bg-fuchsia-200', icon: '' };
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-gradient-to-r from-green-600 via-green-500 to-teal-600 text-center py-6 px-4 shadow-lg sticky top-0 z-10 border-b-4 border-yellow-400">
                        <h1 className="text-3xl md:text-4xl font-black text-white tracking-widest uppercase drop-shadow-md flex justify-center items-center gap-3">
                            <span className="animate-bounce-slow"></span>
                            IRTRA 2026
                            <span className="animate-bounce-slow" style={{ animationDelay: '0.5s' }}></span>
                        </h1>
                        <div className="mt-3">
                            <span className="text-xs font-bold text-green-50 bg-black bg-opacity-20 px-4 py-2 rounded-full shadow-inner">
                                {syncStatus} | Pasaporte a la Diversión
                            </span>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto p-4 mt-6 space-y-8">
                        {/* Progreso General */}
                        <section className="bg-white rounded-2xl shadow-md p-6 border-2 border-green-100 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-green-50 rounded-full -mr-10 -mt-10 opacity-40 pointer-events-none"></div>
                            <h2 className="text-xl font-black text-gray-800 mb-4 flex items-center gap-2">
                                Progreso del Viaje
                            </h2>
                            <div className="w-full bg-gray-100 rounded-full h-8 mb-3 border border-gray-200 shadow-inner overflow-hidden">
                                <div 
                                    className="bg-gradient-to-r from-yellow-400 to-green-500 h-full transition-all duration-1000 ease-out flex items-center justify-end px-3" 
                                    style={{ width: `${Math.max(progress, 5)}%` }}
                                >
                                    {progress > 10 && <span className="text-xs font-bold text-white drop-shadow-md">{progress.toFixed(0)}%</span>}
                                </div>
                            </div>
                            <div className="flex justify-between text-sm font-bold">
                                <span className="text-green-600">Completado: Q {totalPaid.toFixed(2)}</span>
                                <span className="text-gray-500">Meta: Q {totalBudget.toFixed(2)}</span>
                            </div>
                        </section>

                        {/* Categorías */}
                        <div className="space-y-6">
                            {categories.map(cat => {
                                const catItems = items.filter(i => i.category === cat);
                                const catTotal = catItems.reduce((acc, i) => acc + i.cost, 0);
                                const config = getCatConfig(cat);

                                return (
                                    <div key={cat} className={`rounded-2xl border-2 shadow-sm overflow-hidden ${config.bg} ${config.border}`}>
                                        <div className={`px-5 py-3 flex justify-between items-center border-b-2 ${config.header} ${config.border}`}>
                                            <h3 className={`font-black uppercase flex items-center gap-2 ${config.text}`}>
                                                <span className="text-2xl">{config.icon}</span> {cat}
                                            </h3>
                                            <span className="bg-white px-3 py-1 rounded-lg text-xs font-black shadow-sm">
                                                Total: Q {catTotal}
                                            </span>
                                        </div>
                                        <div className="p-3 space-y-3">
                                            {catItems.map(item => (
                                                <div 
                                                    key={item.id}
                                                    onClick={() => toggleCheck(item.id, item.checked)}
                                                    className={`flex items-center justify-between p-4 rounded-xl bg-white border-2 cursor-pointer transition-all ${item.checked ? 'opacity-60 grayscale-[40%] border-transparent' : 'hover:border-current border-transparent shadow-sm'}`}
                                                >
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center border-2 transition-all ${item.checked ? 'bg-green-500 border-green-500' : 'bg-gray-50 border-gray-300'}`}>
                                                            {item.checked && (
                                                                <svg className="w-5 h-5 text-white checkbox-pop" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={4} d="M5 13l4 4L19 7" />
                                                                </svg>
                                                            )}
                                                        </div>
                                                        <div>
                                                            <p className={`font-bold ${item.checked ? 'line-through text-gray-400' : 'text-gray-800'}`}>{item.desc}</p>
                                                            <p className="text-xs font-semibold text-gray-400">{item.group}</p>
                                                        </div>
                                                    </div>
                                                    <span className={`font-black ${item.checked ? 'text-gray-400' : 'text-gray-900'}`}>
                                                        {item.cost > 0 ? `Q ${item.cost}` : 'GRATIS'}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Ticket Total */}
                        <div className="relative bg-gradient-to-r from-yellow-400 via-yellow-300 to-yellow-500 rounded-2xl shadow-2xl p-8 border-4 border-yellow-600 flex flex-col md:flex-row justify-between items-center overflow-hidden">
                            <div className="ticket-edge left"></div>
                            <div className="ticket-edge right"></div>
                            
                            <div className="flex items-center gap-4 z-10 text-center md:text-left mb-4 md:mb-0">
                                <span className="text-5xl animate-bounce-slow">🎟️</span>
                                <div>
                                    <p className="text-yellow-900 text-xs font-black uppercase tracking-widest opacity-70">Costo total estimado</p>
                                    <h2 className="text-3xl font-black text-yellow-900 uppercase">Resumen Final</h2>
                                </div>
                            </div>

                            <div className="bg-white px-8 py-3 rounded-xl border-4 border-yellow-500 shadow-inner z-10 rotate-2">
                                <span className="text-4xl font-black text-green-700">Q {totalBudget.toFixed(2)}</span>
                            </div>
                        </div>

                        <footer className="text-center font-bold text-sm text-gray-400 mt-12 pb-10 flex justify-center items-center gap-2">
                            Te amo mi bonita <span></span> :3
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
