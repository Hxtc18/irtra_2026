<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRTRA 2026 - Presupuesto y Checklist</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #f0fdf4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(#dcfce7 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Ajuste para Android: Quita el cuadro gris/azul al tocar botones y lo hace sentir como App nativa */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        /* Animaciones divertidas */
        @keyframes bounce-slow {

            0%,
            100% {
                transform: translateY(-5%);
                animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
            }

            50% {
                transform: translateY(0);
                animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
            }
        }

        .animate-bounce-slow {
            animation: bounce-slow 2s infinite;
        }

        /* Estilos para el Ticket Final */
        .ticket-edge {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #f0fdf4;
            border-radius: 50%;
            top: 50%;
            border: 4px solid #ca8a04;
        }

        .ticket-edge.left {
            left: -19px;
            border-left-color: transparent;
            border-top-color: transparent;
            border-bottom-color: transparent;
            transform: translateY(-50%) rotate(45deg);
        }

        .ticket-edge.right {
            right: -19px;
            border-right-color: transparent;
            border-top-color: transparent;
            border-bottom-color: transparent;
            transform: translateY(-50%) rotate(-135deg);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE GOOGLE SHEETS ---
        // Pega aquí la URL que te de Google Apps Script al publicar (ver instrucciones abajo)
        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVMD5FONlbXUO8GKCj5kNPX0_q8a4NyiilGSDBSmq5LhrzgXuUKTFb7wbdpnWN88I/exec";

        // Datos iniciales basados en la imagen
        const INITIAL_DATA = [
            // Hospedaje (Q 615)
            { id: 'h1', category: 'Hospedaje', group: 'San Martin', desc: 'Viernes a Sabado', cost: 285, checked: false },
            { id: 'h2', category: 'Hospedaje', group: 'San Martin', desc: 'Sabado a domingo', cost: 330, checked: false },

            // Comida 1 - Irene (Q 900)
            { id: 'c1_v_m', category: 'Comida 1 (Irene)', group: 'Viernes', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c1_v_t', category: 'Comida 1 (Irene)', group: 'Viernes', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c1_v_n', category: 'Comida 1 (Irene)', group: 'Viernes', desc: 'Noche', cost: 100, checked: false },
            { id: 'c1_s_m', category: 'Comida 1 (Irene)', group: 'Sabado', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c1_s_t', category: 'Comida 1 (Irene)', group: 'Sabado', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c1_s_n', category: 'Comida 1 (Irene)', group: 'Sabado', desc: 'Noche', cost: 100, checked: false },
            { id: 'c1_d_m', category: 'Comida 1 (Irene)', group: 'Domingo', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c1_d_t', category: 'Comida 1 (Irene)', group: 'Domingo', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c1_d_n', category: 'Comida 1 (Irene)', group: 'Domingo', desc: 'Noche', cost: 100, checked: false },

            // Comida 2 - Hector (Q 900)
            { id: 'c2_v_m', category: 'Comida 2 (Hector)', group: 'Viernes', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c2_v_t', category: 'Comida 2 (Hector)', group: 'Viernes', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c2_v_n', category: 'Comida 2 (Hector)', group: 'Viernes', desc: 'Noche', cost: 100, checked: false },
            { id: 'c2_s_m', category: 'Comida 2 (Hector)', group: 'Sabado', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c2_s_t', category: 'Comida 2 (Hector)', group: 'Sabado', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c2_s_n', category: 'Comida 2 (Hector)', group: 'Sabado', desc: 'Noche', cost: 100, checked: false },
            { id: 'c2_d_m', category: 'Comida 2 (Hector)', group: 'Domingo', desc: 'Mañana', cost: 100, checked: false },
            { id: 'c2_d_t', category: 'Comida 2 (Hector)', group: 'Domingo', desc: 'Tarde', cost: 100, checked: false },
            { id: 'c2_d_n', category: 'Comida 2 (Hector)', group: 'Domingo', desc: 'Noche', cost: 100, checked: false },

            // Gasolina (Q 600)
            { id: 'g1', category: 'Gasolina', group: 'Viernes', desc: 'Guate / Toto', cost: 300, checked: false },
            { id: 'g2', category: 'Gasolina', group: 'Viernes', desc: 'Toto / Reu (CUBIERTO)', cost: 0, checked: true },
            { id: 'g3', category: 'Gasolina', group: 'Domingo', desc: 'Reu / Toto (CUBIERTO)', cost: 0, checked: true },
            { id: 'g4', category: 'Gasolina', group: 'Domingo', desc: 'Toto / Guate', cost: 300, checked: false },

            // Chingaderas (Q 800)
            { id: 'ch1', category: 'Chingaderas', group: 'General', desc: 'Presupuesto general', cost: 800, checked: false },
        ];

        const App = () => {
            const [items, setItems] = useState(INITIAL_DATA);
            const [loading, setLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState(GOOGLE_APP_SCRIPT_URL ? 'Pendiente' : ' ');

            // Cargar datos desde Google Sheets (si la URL está configurada)
            useEffect(() => {
                if (!GOOGLE_APP_SCRIPT_URL) return;

                const fetchData = async () => {
                    setLoading(true);
                    setSyncStatus('Sincronizando...');
                    try {
                        const response = await fetch(GOOGLE_APP_SCRIPT_URL);
                        const data = await response.json();

                        // Combinar estado de Google Sheets con nuestros datos base (por ID)
                        if (data && data.length > 0) {
                            const updatedItems = INITIAL_DATA.map(baseItem => {
                                const sheetItem = data.find(s => s.id === baseItem.id);
                                return sheetItem ? { ...baseItem, checked: sheetItem.checked } : baseItem;
                            });
                            setItems(updatedItems);
                            setSyncStatus('Conectado a Sheets');
                        }
                    } catch (error) {
                        console.error("Error al cargar datos:", error);
                        setSyncStatus('Error de conexión');
                    }
                    setLoading(false);
                };

                fetchData();
            }, []);

            // Actualizar checkbox
            const toggleCheck = async (id, currentStatus) => {
                const newStatus = !currentStatus;

                // Actualización optimista (UI primero)
                setItems(prevItems =>
                    prevItems.map(item => item.id === id ? { ...item, checked: newStatus } : item)
                );

                // Enviar a Google Sheets
                if (GOOGLE_APP_SCRIPT_URL) {
                    setSyncStatus('Guardando...');
                    try {
                        await fetch(GOOGLE_APP_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors', // Necesario para no tener problemas de CORS con Apps Script
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ id: id, checked: newStatus })
                        });
                        setSyncStatus('Guardado ✓');
                        setTimeout(() => setSyncStatus('Te amo mami'), 2000);
                    } catch (error) {
                        console.error("Error al guardar:", error);
                        setSyncStatus('Error al guardar');
                        // Revertir en caso de error
                        setItems(prevItems =>
                            prevItems.map(item => item.id === id ? { ...item, checked: currentStatus } : item)
                        );
                    }
                }
            };

            // Agrupar por categorías
            const categories = [...new Set(items.map(i => i.category))];

            // Totales
            const totalBudget = useMemo(() => items.reduce((acc, item) => acc + item.cost, 0), [items]);
            const totalPaid = useMemo(() => items.reduce((acc, item) => acc + (item.checked ? item.cost : 0), 0), [items]);
            const progress = totalBudget > 0 ? (totalPaid / totalBudget) * 100 : 0;

            // Configuración creativa para cada categoría
            const getCategoryConfig = (category) => {
                if (category.includes('Hospedaje')) return { bg: 'bg-emerald-50', border: 'border-emerald-400', text: 'text-emerald-900', headerBg: 'bg-emerald-200', icon: '' };
                if (category.includes('Comida 1')) return { bg: 'bg-orange-50', border: 'border-orange-400', text: 'text-orange-900', headerBg: 'bg-orange-200', icon: '' };
                if (category.includes('Comida 2')) return { bg: 'bg-amber-50', border: 'border-amber-400', text: 'text-amber-900', headerBg: 'bg-amber-200', icon: '' };
                if (category.includes('Gasolina')) return { bg: 'bg-slate-50', border: 'border-slate-400', text: 'text-slate-900', headerBg: 'bg-slate-200', icon: '' };
                return { bg: 'bg-fuchsia-50', border: 'border-fuchsia-400', text: 'text-fuchsia-900', headerBg: 'bg-fuchsia-200', icon: '' }; // Chingaderas
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header Temático IRTRA */}
                    <div className="bg-gradient-to-r from-green-600 via-green-500 to-teal-600 text-center py-6 px-4 md:px-6 shadow-lg sticky top-0 z-10 border-b-4 border-yellow-400">
                        <h1 className="text-3xl md:text-4xl font-black text-white tracking-widest uppercase drop-shadow-md flex justify-center items-center gap-2 md:gap-3">
                            <span className="animate-bounce-slow text-3xl md:text-4xl"></span>
                            IRTRA 2026
                            <span className="animate-bounce-slow text-3xl md:text-4xl" style={{ animationDelay: '0.5s' }}></span>
                        </h1>
                        <div className="mt-3 px-1 md:px-0">
                            <span className="text-xs md:text-sm font-bold text-green-50 bg-black bg-opacity-20 px-3 md:px-4 py-2 rounded-2xl md:rounded-full backdrop-blur-sm shadow-inner flex flex-col md:flex-row items-center gap-1 md:gap-2 max-w-fit mx-auto text-center leading-tight">
                                <span>Destinos: Hostales, Xetulul, Xocomil, Mil Palmeras, Aldea de la Selva</span>
                                <span className="opacity-50 hidden md:inline">|</span>
                                <span>Viaje 2026 <span className={syncStatus.includes('Error') ? 'text-red-300' : 'text-yellow-300'}>{syncStatus}</span></span>
                            </span>
                        </div>
                    </div>

                    <div className="max-w-3xl mx-auto p-3 md:p-4 mt-4 md:mt-6 space-y-6 md:space-y-8">

                        {/* Barra de progreso / Resumen de Viaje */}
                        <div className="bg-white rounded-2xl shadow-md p-4 md:p-6 border-2 border-green-100 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-24 h-24 md:w-32 md:h-32 bg-green-50 rounded-full -mr-8 -mt-8 md:-mr-10 md:-mt-10 opacity-50 pointer-events-none"></div>
                            <h2 className="text-lg md:text-xl font-black text-gray-800 mb-3 md:mb-4 flex items-center gap-2">
                                <span className="text-xl md:text-2xl"></span> Progreso
                            </h2>
                            <div className="relative w-full bg-gray-100 rounded-full h-6 md:h-8 mb-3 border border-gray-200 shadow-inner overflow-hidden">
                                <div className="bg-gradient-to-r from-yellow-400 via-green-400 to-green-500 h-6 md:h-8 rounded-full transition-all duration-1000 ease-out flex items-center justify-end px-3 shadow-md" style={{ width: `${Math.max(progress, 8)}%` }}>
                                    <span className="text-base md:text-lg drop-shadow-md leading-none">{progress >= 100 ? '' : ''}</span>
                                </div>
                            </div>
                            <div className="flex justify-between text-sm md:text-base font-bold">
                                <span className="text-green-600 flex items-center gap-1">Pagado: Q {totalPaid.toFixed(2)}</span>
                                <span className="text-gray-500 flex items-center gap-1">Meta: Q {totalBudget.toFixed(2)}</span>
                            </div>
                        </div>

                        {/* Listado de items por categoría */}
                        <div className="grid gap-5 md:gap-6">
                            {categories.map(cat => {
                                const catItems = items.filter(i => i.category === cat);
                                const catTotal = catItems.reduce((acc, curr) => acc + curr.cost, 0);
                                const catPaid = catItems.reduce((acc, curr) => acc + (curr.checked ? curr.cost : 0), 0);
                                const config = getCategoryConfig(cat);

                                return (
                                    <div key={cat} className={`rounded-2xl border-2 shadow-sm overflow-hidden transition-transform duration-300 hover:-translate-y-1 ${config.bg} ${config.border}`}>
                                        {/* Cabecera Categoría */}
                                        <div className={`px-4 md:px-5 py-3 flex justify-between items-center border-b-2 ${config.headerBg} ${config.border}`}>
                                            <h3 className={`font-black uppercase tracking-wide flex items-center gap-2 text-base md:text-xl ${config.text}`}>
                                                <span className="text-xl md:text-3xl drop-shadow-sm">{config.icon}</span> {cat}
                                            </h3>
                                            <span className={`font-black text-xs md:text-sm bg-white px-2 md:px-3 py-1 md:py-1.5 rounded-lg shadow-sm ${config.text}`}>
                                                Q {catPaid} / Q {catTotal}
                                            </span>
                                        </div>

                                        {/* Items */}
                                        <div className="p-2 md:p-3 space-y-2 md:space-y-3">
                                            {catItems.map(item => (
                                                <div
                                                    key={item.id}
                                                    onClick={() => toggleCheck(item.id, item.checked)}
                                                    className={`group select-none flex items-center justify-between p-3 md:p-4 rounded-xl bg-white shadow-sm border-2 border-transparent hover:border-current cursor-pointer transition-all duration-200 ${item.checked ? 'opacity-70 scale-[0.98] grayscale-[30%]' : 'hover:shadow-md'} ${config.text.replace('text-', 'hover:border-')}`}
                                                >
                                                    <div className="flex items-center gap-3 md:gap-4 flex-1">
                                                        <div className={`w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center border-2 flex-shrink-0 transition-colors ${item.checked ? 'bg-green-500 border-green-500' : 'bg-gray-50 border-gray-300 group-hover:border-current'}`}>
                                                            {item.checked && (
                                                                <svg className="w-4 h-4 md:w-5 md:h-5 text-white animate-[ping_0.2s_ease-out_forwards]" fill="none" viewBox="0 0 24 24" stroke="currentColor" style={{ animationIterationCount: 1 }}>
                                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                                                                </svg>
                                                            )}
                                                        </div>
                                                        <div>
                                                            <p className={`font-bold text-base md:text-lg leading-tight md:leading-normal ${item.checked ? 'line-through text-gray-400' : 'text-gray-800'}`}>
                                                                {item.desc}
                                                            </p>
                                                            <p className="text-xs md:text-sm font-semibold opacity-70 flex items-center gap-1 mt-0.5 md:mt-0">
                                                                <span className="inline-block w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-current opacity-50"></span>
                                                                {item.group}
                                                            </p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right pl-2">
                                                        <span className={`text-sm md:text-lg font-black whitespace-nowrap ${item.checked ? 'text-gray-400' : 'text-gray-900'}`}>
                                                            {item.cost > 0 ? `Q ${item.cost.toFixed(2)}` : '¡GRATIS!'}
                                                        </span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Gran Total (Estilo Ticket Mágico) */}
                        <div className="relative bg-gradient-to-r from-yellow-400 via-yellow-300 to-yellow-500 rounded-2xl shadow-2xl p-6 md:p-8 border-4 border-yellow-600 flex flex-col md:flex-row justify-between items-center overflow-hidden mt-8 md:mt-10">
                            {/* Decoración de Ticket (Recortes en los bordes) */}
                            <div className="ticket-edge left"></div>
                            <div className="ticket-edge right"></div>

                            <div className="flex items-center gap-3 md:gap-4 z-10 mb-5 md:mb-0 text-center md:text-left flex-col md:flex-row">
                                <span className="text-4xl md:text-5xl animate-bounce-slow" style={{ textShadow: '0 4px 6px rgba(0,0,0,0.2)' }}>🎟️</span>
                                <div className="flex flex-col">
                                    <span className="text-yellow-900 text-xs md:text-sm font-black uppercase tracking-widest opacity-80">Pasaporte a la Diversión</span>
                                    <span className="text-2xl md:text-3xl font-black text-yellow-900 uppercase tracking-tight">Gran Total</span>
                                </div>
                            </div>
                            <div className="bg-white px-5 md:px-6 py-2 md:py-3 rounded-xl border-4 border-yellow-500 shadow-inner z-10 transform rotate-2 hover:rotate-0 transition-transform cursor-default">
                                <span className="text-2xl md:text-4xl font-black text-green-700 whitespace-nowrap">Q {totalBudget.toFixed(2)}</span>
                            </div>

                            {/* Confeti de fondo sutil */}
                            <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 20% 50%, #d946ef 4px, transparent 5px), radial-gradient(circle at 80% 30%, #3b82f6 4px, transparent 5px), radial-gradient(circle at 50% 80%, #10b981 4px, transparent 5px)' }}></div>
                        </div>

                        <div className="text-center font-bold text-sm text-gray-400 mt-6 pb-12 flex justify-center items-center gap-2">
                            <span>Te amo mi bonita</span> :3 <span></span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
